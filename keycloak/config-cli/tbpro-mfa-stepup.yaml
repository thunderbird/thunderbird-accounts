# keycloak-config-cli: remember-me session and MFA step-up configuration for the tbpro realm.
#
# This file is the single source of truth for the remember-me session timeouts and the
# browser MFA step-up flow used by keycloak-mfa-rest. It is applied on every Keycloak
# start (local + stage/prod) from scripts/entry-keycloak.sh, replacing the old
# ensure_keycloak_mfa_flow management command. config-cli reconciles declaratively: it
# applies only the properties declared here and leaves every other realm resource
# untouched (see IMPORT_MANAGED_* and the no-delete strategy in apply-mfa-config.sh).
#
# A separate top-level flow (browser-mfa-stepup) is bound rather than mutating the
# built-in "browser" flow, so the original stays intact as a fallback (rebind browserFlow
# to "browser" to revert).
realm: tbpro

# "Keep me signed in" sessions last 90 days (seconds). MFA_L1_LOA_MAX_AGE below must be
# at least this value or remember-me users get re-prompted for their password much earlier.
ssoSessionIdleTimeoutRememberMe: 7776000
ssoSessionMaxLifespanRememberMe: 7776000

# Map the named ACR values the provider checks (acr=2) to Keycloak LoA levels.
attributes:
  "acr.loa.map": '{"1":1,"2":2}'

# Bind the realm's browser login to the step-up flow defined below.
browserFlow: browser-mfa-stepup

# Bind forgot-password to the reset flow defined below. The built-in "reset credentials"
# flow runs the reset-otp authenticator, which ENROLLS a new authenticator app instead of
# validating the existing one — possession of the reset email alone would bypass the
# second factor entirely (#1098). Rebind resetCredentialsFlow to "reset credentials" to
# revert.
resetCredentialsFlow: reset-credentials-mfa

# LoA condition configs. Level 2 keeps loa-max-age=0 so Keycloak re-challenges the second
# factor on every step-up, refreshing the token's auth_time for the provider's freshness
# gate. Level 1's window MUST cover the realm's longest possible SSO session — now
# ssoSessionMaxLifespanRememberMe (90 days, above): a shorter window re-prompts
# username/password on a still-valid session. MFA_L1_LOA_MAX_AGE is injected per
# environment and is 7776000 everywhere (docker-compose.yml, pulumi/config.*.yaml).
authenticatorConfig:
  - alias: "mfa step-up level 1"
    config:
      loa-condition-level: "1"
      loa-max-age: "$(env:MFA_L1_LOA_MAX_AGE)"
  - alias: "mfa step-up level 2"
    config:
      loa-condition-level: "2"
      loa-max-age: "0"

# Execution order within each (sub)flow matters — config-cli builds them in array order.
authenticationFlows:
  - alias: browser-mfa-stepup
    description: Browser flow with MFA step-up (LoA) for keycloak-mfa-rest
    providerId: basic-flow
    topLevel: true
    builtIn: false
    authenticationExecutions:
      - authenticator: auth-cookie
        requirement: ALTERNATIVE
        authenticatorFlow: false
      - authenticator: identity-provider-redirector
        requirement: ALTERNATIVE
        authenticatorFlow: false
      - flowAlias: stepup-forms
        requirement: ALTERNATIVE
        authenticatorFlow: true

  - alias: stepup-forms
    description: username/password + LoA step-up
    providerId: basic-flow
    topLevel: false
    builtIn: false
    authenticationExecutions:
      - flowAlias: stepup-l1
        requirement: CONDITIONAL
        authenticatorFlow: true
      - flowAlias: stepup-l2
        requirement: CONDITIONAL
        authenticatorFlow: true

  - alias: stepup-l1
    description: first factor (LoA1)
    providerId: basic-flow
    topLevel: false
    builtIn: false
    authenticationExecutions:
      - authenticator: auth-username-password-form
        requirement: REQUIRED
        authenticatorFlow: false
      - flowAlias: stepup-l1-otp
        requirement: CONDITIONAL
        authenticatorFlow: true
      - authenticator: conditional-level-of-authentication
        authenticatorConfig: "mfa step-up level 1"
        requirement: REQUIRED
        authenticatorFlow: false

  - alias: stepup-l1-otp
    description: conditional second factor at L1
    providerId: basic-flow
    topLevel: false
    builtIn: false
    authenticationExecutions:
      - authenticator: conditional-user-configured
        requirement: REQUIRED
        authenticatorFlow: false
      # Both second factors are ALTERNATIVE so a user with either (or both) can
      # complete L1: Keycloak runs the first and exposes "try another way" to switch
      # to the other. OTP is listed first so it is the default. This mirrors stepup-l2
      # and Keycloak's built-in "Browser - Conditional OTP" flow.
      - authenticator: auth-otp-form
        requirement: ALTERNATIVE
        authenticatorFlow: false
      - authenticator: auth-recovery-authn-code-form
        requirement: ALTERNATIVE
        authenticatorFlow: false

  - alias: stepup-l2
    description: OTP step-up (LoA2)
    providerId: basic-flow
    topLevel: false
    builtIn: false
    authenticationExecutions:
      - authenticator: auth-otp-form
        requirement: ALTERNATIVE
        authenticatorFlow: false
      - authenticator: auth-recovery-authn-code-form
        requirement: ALTERNATIVE
        authenticatorFlow: false
      - authenticator: conditional-level-of-authentication
        authenticatorConfig: "mfa step-up level 2"
        requirement: REQUIRED
        authenticatorFlow: false

  # Forgot-password flow (#1098). Same as the built-in "reset credentials" flow except
  # the second factor: reset-otp is replaced with a validation subflow, so a user who has
  # 2FA must pass their EXISTING second factor (right after the email link, before the
  # password form) instead of being handed a fresh enrollment screen. Users without 2FA
  # skip the subflow and reset as before.
  - alias: reset-credentials-mfa
    description: Reset credentials verifying the existing second factor
    providerId: basic-flow
    topLevel: true
    builtIn: false
    authenticationExecutions:
      - authenticator: reset-credentials-choose-user
        requirement: REQUIRED
        authenticatorFlow: false
      - authenticator: reset-credential-email
        requirement: REQUIRED
        authenticatorFlow: false
      - flowAlias: reset-mfa-otp
        requirement: CONDITIONAL
        authenticatorFlow: true
      - authenticator: reset-password
        requirement: REQUIRED
        authenticatorFlow: false

  - alias: reset-mfa-otp
    description: verify existing second factor during password reset
    providerId: basic-flow
    topLevel: false
    builtIn: false
    authenticationExecutions:
      - authenticator: conditional-user-configured
        requirement: REQUIRED
        authenticatorFlow: false
      # Same alternatives as stepup-l1-otp: OTP is the default, "try another way"
      # offers recovery codes for users who lost their authenticator device.
      - authenticator: auth-otp-form
        requirement: ALTERNATIVE
        authenticatorFlow: false
      - authenticator: auth-recovery-authn-code-form
        requirement: ALTERNATIVE
        authenticatorFlow: false
