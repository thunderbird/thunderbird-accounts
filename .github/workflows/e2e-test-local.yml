name: e2e-test-local

concurrency:
  group: e2e-test-local
  cancel-in-progress: true

on:
  push:
    branches:
      - '**'
      - '!main'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:
  run-e2e-tests-local:
    runs-on: ubuntu-latest
    environment: staging
    # temporary while debugging; don't want everyone getting emailed when it fails
    continue-on-error: true
    env:
      ACCTS_FXA_EMAIL: ${{ secrets.E2E_ACCTS_STAGE_FXA_EMAIL }}
      ACCTS_FXA_PASSWORD: ${{ secrets.E2E_ACCTS_STAGE_FXA_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Start appointment stack via docker
        run: docker compose up -d --build -V postgres redis backend frontend

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'test/e2e/package-lock.json'

      - name: Install E2E test dependencies
        run: |
          cd ./test/e2e
          npm install
          npx playwright install

      - name: Run E2E tests against local stack
        run: |
          cd ./test/e2e
          cp .env.dev.example .env
          mkdir e2e-artifacts
          npm run e2e-test

      - name: 'Artifact E2E Screenshots'
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-artifacts
          path: ./e2e-artifacts/**/*.png
          retention-days: 3
