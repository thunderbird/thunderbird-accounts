# This forms the base of Accounts-based task definitions. The blank fields commented here must be set on any
# inheriting task definition:
#   family:
#   cpu:
#   memory:
#   container_definitions:
.accounts_taskdef: &ACCOUNTS_TASK_DEFINITION
  network_mode: awsvpc
  requires_compatibilities:
   - FARGATE

# This forms the base of Accounts-based container definitions. The blank fields commented here must be set on any
# inheriting container definition:
#   environment:
#   logConfiguration:
.accounts_contdef: &ACCOUNTS_CONTAINER_DEFINITION
  image: *ACCOUNTS_IMAGE
  essential: true
  mountPoints: []
  linuxParameters:
    initProcessEnabled: True
  restartPolicy:
    enabled: yes
    restartAttemptPeriod: 300
  secrets:
    - *SECRET_AUTH_ALLOW_LIST
    - *SECRET_DATABASE_HOST
    - *SECRET_DATABASE_NAME
    - *SECRET_DATABASE_PASSWORD
    - *SECRET_DATABASE_USER
    - *SECRET_FXA_CLIENT_ID
    - *SECRET_FXA_ENCRYPT_SECRET
    - *SECRET_FXA_SECRET
    - *SECRET_KEYCLOAK_ADMIN_CLIENT_ID
    - *SECRET_KEYCLOAK_ADMIN_CLIENT_SECRET
    - *SECRET_LOGIN_CODE_SECRET
    - *SECRET_OIDC_CLIENT_ID
    - *SECRET_OIDC_CLIENT_SECRET
    - *SECRET_OIDC_SIGN_ALGO
    - *SECRET_PADDLE_API_KEY
    - *SECRET_PADDLE_PRICE_ID_LO
    - *SECRET_PADDLE_PRICE_ID_MD
    - *SECRET_PADDLE_PRICE_ID_HI
    - *SECRET_PADDLE_TOKEN
    - *SECRET_PADDLE_WEBHOOK_KEY
    - *SECRET_REDIS_URL
    - *SECRET_SECRET_KEY
    - *SECRET_SENTRY_DSN
    - *SECRET_STALWART_API_AUTH_METHOD
    - *SECRET_STALWART_API_AUTH_STRING
    - *SECRET_ZENDESK_API_TOKEN
    - *SECRET_ZENDESK_SUBDOMAIN
    - *SECRET_ZENDESK_USER_EMAIL

### tb_pulumi resource configs
resources:
  domains:
    accounts: accounts-stage.tb.pro

  tb:network:MultiCidrVpc:
    vpc:
      cidr_block: 10.11.0.0/16
      subnets:
        eu-central-1a:
          - 10.11.0.0/17
        eu-central-1b:
          - 10.11.128.0/17
      enable_internet_gateway: True
      egress_via_internet_gateway: True
      enable_dns_hostnames: True
      endpoint_interfaces:
        - ecr.api
        - ecr.dkr
        - logs
        - secretsmanager
      peering_connections:
        mailstrom-stage:
          peered_cidrs:
            - 10.1.0.0/16
          peer_vpc_id: vpc-0de6d9ceaf7194dd3
          auto_accept: True  # Requires both VPCs to be in same account and region
          # Allow resolution of DNS records to private IPs (so we can use a private LB)
          accepter:
            allow_remote_vpc_dns_resolution: True
          requester:
            allow_remote_vpc_dns_resolution: True

  # The __main.py__ here is very specific in the following way:
  # For each ECS cluster you eventually define, you **must** have one entry by the same exact name in the
  # `load_balancers` and `containers` sections below. If the cluster does not expose a service (f/ex, uses
  # `build_load_balancer: False`), you may set the `load_balancers` entry to `null`.
  tb:network:SecurityGroupWithRules:
    load_balancers:
      accounts:
        rules:
          ingress:
            - description: TLS traffic to the load balancer from the world
              cidr_blocks:
                - 0.0.0.0/0
              protocol: tcp
              from_port: 443
              to_port: 443
          egress:
            - description: Allow outbound traffic to anywhere
              protocol: tcp
              from_port: 0
              to_port: 65535
              cidr_blocks:
                - 0.0.0.0/0
      accounts-celery: null
      keycloak:
        rules:
          ingress:
            - description: TLS traffic to the load balancer from the world
              cidr_blocks:
                - 0.0.0.0/0
              protocol: tcp
              from_port: 443
              to_port: 443
          egress:
            - description: Allow outbound traffic to anywhere
              protocol: tcp
              from_port: 0
              to_port: 65535
              cidr_blocks:
                - 0.0.0.0/0
      keycloak-mgmt: null
    containers:
      accounts:
        rules:
          ingress:
            - description: Allow traffic from the load balancer to the container
              protocol: tcp
              from_port: 8087
              to_port: 8087
          egress:
            - description: Allow traffic from the container out to the Internet
              cidr_blocks:
                - 0.0.0.0/0
              protocol: tcp
              from_port: 0
              to_port: 65535
      accounts-celery:
        rules:
          ingress: []
          egress:
            - description: Allow traffic from the container out to the Internet
              cidr_blocks:
                - 0.0.0.0/0
              protocol: tcp
              from_port: 0
              to_port: 65535
      keycloak:
        rules:
          ingress:
            - description: Allow traffic from the load balancer to the service port
              protocol: tcp
              from_port: 8080
              to_port: 8080
            # KeyCloak exposes health checks on the management port. Don't route any real traffic here.
            - description: Allow traffic from the load balancer to the management port
              protocol: tcp
              from_port: 9000
              to_port: 9000
            # KeyCloak clustered nodes speak to each other on port 7800
            - description: Allow clustered nodes to communicate
              protocol: tcp
              from_port: 7800
              to_port: 7800
              self: True
          egress:
            - description: Allow traffic from the container out to the Internet
              cidr_blocks:
                - 0.0.0.0/0
              protocol: tcp
              from_port: 0
              to_port: 65535

  tb:secrets:PulumiSecretsManager:
    pulumi:
      secret_names:
        - database-host
        - database-name
        - database-password
        - database-user
        - fxa-allow-list
        - fxa-client-id
        - fxa-secret
        - login-code-secret
        - secret-key
        - fxa-encrypt-secret
        - sentry-dsn
        - paddle-token
        - paddle-price-id-lo
        - paddle-price-id-md
        - paddle-price-id-hi
        - paddle-webhook-key
        - paddle-api-key
        - redis-url
        - keycloak-database-host
        - keycloak-database-name
        - keycloak-database-password
        - keycloak-database-user
        - keycloak-admin-password
        - zendesk-subdomain
        - zendesk-user-email
        - zendesk-api-token
        - oidc-client-secret
        - oidc-client-id
        - oidc-sign-algo
        - stalwart-api-auth-method
        - stalwart-api-auth-key
        - keycloak-admin-client-id
        - keycloak-admin-client-secret
        - appointment-caldav-secret

  tb:ec2:SshableInstance: {}
  # Fill out this template to build an SSH bastion
  # tb:ec2:SshableInstance:
  #   bastion:
  #     ssh_keypair_name: your-keypair
  #     source_cidrs:
  #       - 1.2.3.4/32

  tb:elasticache:ElastiCacheReplicaGroup:
    accounts:
      num_cache_clusters: 1
      automatic_failover_enabled: False
      transit_encryption_mode: required
      transit_encryption_enabled: True
      apply_immediately: True
  
  tb:fargate:AutoscalingFargateCluster:
    accounts:
      cluster: {}

      cluster_name: accounts-stage

      task_definitions:
        celery-stage:
          <<: *ACCOUNTS_TASK_DEFINITION
          family: accounts-stage-celery
          cpu: 512
          memory: 1024
          container_definitions:
            - <<: *ACCOUNTS_CONTAINER_DEFINITION
              name: celery
              logConfiguration:
                logDriver: awslogs
                options:
                  awslogs-group: accounts-stage-afc-accounts-loggroup-celery-stage
                  awslogs-stream-prefix: accounts/stage/celery-stage/
                  awslogs-region: eu-central-1
              environment:
                - *VAR_ADMIN_CONTACT
                - *VAR_ADMIN_WEBSITE
                - *VAR_ALLOWED_EMAIL_DOMAINS
                - *VAR_APP_ENV
                - *VAR_AUTH_SCHEME
                - *VAR_CSRF_HTTPONLY
                - *VAR_CSRF_SECURE
                - *VAR_CSRF_TRUSTED_ORIGINS
                - *VAR_FXA_CALLBACK
                - *VAR_FXA_OAUTH_SERVER_URL
                - *VAR_FXA_OPEN_ID_CONFIG
                - *VAR_FXA_PROFILE_SERVER_URL
                - *VAR_IMAP_HOST
                - *VAR_IMAP_PORT
                - *VAR_IMAP_TLS
                - *VAR_KEYCLOAK_URL_API
                - *VAR_KEYCLOAK_ADMIN_URL_TOKEN
                - *VAR_JMAP_HOST
                - *VAR_JMAP_PORT
                - *VAR_JMAP_TLS
                - *VAR_MIN_CUSTOM_DOMAIN_ALIAS_LENGTH
                - *VAR_OIDC_URL_AUTH
                - *VAR_OIDC_URL_TOKEN
                - *VAR_OIDC_URL_USER
                - *VAR_OIDC_URL_JWKS
                - *VAR_OIDC_URL_LOGOUT
                - *VAR_PADDLE_ENV
                - *VAR_PUBLIC_BASE_URL
                - *VAR_REDIS_CELERY_DB
                - *VAR_REDIS_CELERY_RESULTS_DB
                - *VAR_REDIS_INTERNAL_DB
                - *VAR_REDIS_SHARED_DB
                - *VAR_SMTP_HOST
                - *VAR_SMTP_PORT
                - *VAR_SMTP_TLS
                - *VAR_STALWART_BASE_API_URL
                - *VAR_STALWART_BASE_JMAP_URL
                - *VAR_SUPPORT_CONTACT
                - *VAR_TB_PRO_APPOINTMENT_URL
                - *VAR_TB_PRO_SEND_URL
                - *VAR_TB_PRO_WAIT_LIST_URL
                - *VAR_USE_ALLOW_LIST
                - *VAR_VERIFY_PRIVATE_LINK_SSL
                - *VAR_ZENDESK_FORM_ID
                - *VAR_ZENDESK_FORM_BROWSER_FIELD_ID
                - *VAR_ZENDESK_FORM_OS_FIELD_ID
                - *VAR_LOG_LEVEL
                - *VAR_SENTRY_PROFILE_SAMPLE_RATE
                - name: TBA_CELERY
                  value: "yes"
                - name: TBA_FLOWER
                  value: "no"

        flower-stage:
          <<: *ACCOUNTS_TASK_DEFINITION
          family: accounts-stage-flower
          cpu: 512
          memory: 1024
          container_definitions:
            - <<: *ACCOUNTS_CONTAINER_DEFINITION
              name: flower
              logConfiguration:
                logDriver: awslogs
                options:
                  awslogs-group: accounts-stage-afc-accounts-loggroup-flower-stage
                  awslogs-stream-prefix: accounts/stage/flower-stage/
                  awslogs-region: eu-central-1
              portMappings:
                - containerPort: 5555
                  hostPort: 5555
                  protocol: tcp
              environment:
                - *VAR_ADMIN_CONTACT
                - *VAR_ADMIN_WEBSITE
                - *VAR_ALLOWED_EMAIL_DOMAINS
                - *VAR_APP_ENV
                - *VAR_AUTH_SCHEME
                - *VAR_CSRF_HTTPONLY
                - *VAR_CSRF_SECURE
                - *VAR_CSRF_TRUSTED_ORIGINS
                - *VAR_FXA_CALLBACK
                - *VAR_FXA_OAUTH_SERVER_URL
                - *VAR_FXA_OPEN_ID_CONFIG
                - *VAR_FXA_PROFILE_SERVER_URL
                - *VAR_IMAP_HOST
                - *VAR_IMAP_PORT
                - *VAR_IMAP_TLS
                - *VAR_KEYCLOAK_URL_API
                - *VAR_KEYCLOAK_ADMIN_URL_TOKEN
                - *VAR_JMAP_HOST
                - *VAR_JMAP_PORT
                - *VAR_JMAP_TLS
                - *VAR_MIN_CUSTOM_DOMAIN_ALIAS_LENGTH
                - *VAR_OIDC_URL_AUTH
                - *VAR_OIDC_URL_TOKEN
                - *VAR_OIDC_URL_USER
                - *VAR_OIDC_URL_JWKS
                - *VAR_OIDC_URL_LOGOUT
                - *VAR_PADDLE_ENV
                - *VAR_PUBLIC_BASE_URL
                - *VAR_REDIS_CELERY_DB
                - *VAR_REDIS_CELERY_RESULTS_DB
                - *VAR_REDIS_INTERNAL_DB
                - *VAR_REDIS_SHARED_DB
                - *VAR_SMTP_HOST
                - *VAR_SMTP_PORT
                - *VAR_SMTP_TLS
                - *VAR_STALWART_BASE_API_URL
                - *VAR_STALWART_BASE_JMAP_URL
                - *VAR_SUPPORT_CONTACT
                - *VAR_TB_PRO_APPOINTMENT_URL
                - *VAR_TB_PRO_SEND_URL
                - *VAR_TB_PRO_WAIT_LIST_URL
                - *VAR_USE_ALLOW_LIST
                - *VAR_VERIFY_PRIVATE_LINK_SSL
                - *VAR_ZENDESK_FORM_ID
                - *VAR_ZENDESK_FORM_BROWSER_FIELD_ID
                - *VAR_ZENDESK_FORM_OS_FIELD_ID
                - *VAR_LOG_LEVEL
                - *VAR_SENTRY_PROFILE_SAMPLE_RATE
                - name: TBA_CELERY
                  value: "no"
                - name: TBA_FLOWER
                  value: "yes"

      targets:
        flower:
          name: flower-stage
          health_check:
            enabled: true
            healthy_threshold: 3
            interval: 15
            path: /
            port: 5555
            protocol: HTTP
            timeout: 5
            unhealthy_threshold: 3
          port: 5555
          protocol: HTTP
          target_type: ip
          ip_address_type: ipv4
      
      load_balancers:
        flower:
          enable_cross_zone_load_balancing: yes
          internal: yes
          ip_address_type: ipv4
          load_balancer_type: application
          name: flower-stage

      container_security_groups:
        celery-stage:
          none:
            description: Network config for Celery containers in accounts-stage
            rules:
              egress:
                - from_port: 0
                  to_port: 65535
                  protocol: tcp
                  description: Allow all egress
                  cidr_blocks:
                    - 0.0.0.0/0
              ingress: []  # Celery is a "pull" based system, requiring no ingress
        flower-stage:    # Service to connect
          flower:  # LB to allow connections from
            description: Network config for Flower containers in accounts-stage
            rules:
              egress:
                - from_port: 0
                  to_port: 65535
                  protocol: tcp
                  description: Allow all egress
                  cidr_blocks:
                    - 0.0.0.0/0
              ingress:
                - from_port: 5555
                  to_port: 5555
                  protocol: tcp
                  description: Allow traffic to Flower service

      load_balancer_security_groups:
        flower:  # LB to apply the rules to
          description: Network config for Flower load balancer in accounts-stage
          rules:
            egress:
              - from_port: 0
                to_port: 65535
                protocol: tcp
                description: Allow all egress
                cidr_blocks:
                  - 0.0.0.0/0
            ingress:
              - from_port: 443
                to_port: 443
                protocol: tcp
                description: Allow local TLS traffic only
                cidr_blocks:
                  - 10.11.0.0/16
      
      listeners:
        flower:  # Load balancer to attach to
          flower:  # Target to route traffic to
            certificate_arn: arn:aws:acm:eu-central-1:768512802988:certificate/f6c6defd-28d2-412b-a61a-6e91f40e0ffd  # flower-stage.tb.pro
            port: 443
            protocol: HTTPS

      services:
        celery-stage:
          assign_public_ip: yes
          service:
            desired_count: 1
          target: null
        flower-stage:
          assign_public_ip: yes
          container_name: flower
          container_port: 5555
          load_balancer: flower
          service:
            desired_count: 1
          target: flower

      registries:
        celery-stage:
          - arn:aws:ecr:eu-central-1:768512802988:repository/thunderbird/accounts*
        flower-stage:
          - arn:aws:ecr:eu-central-1:768512802988:repository/thunderbird/accounts*

      secrets:
        celery-stage:
          - arn:aws:secretsmanager:eu-central-1:768512802988:secret:accounts/stage/*
        flower-stage:
          - arn:aws:secretsmanager:eu-central-1:768512802988:secret:accounts/stage/*
      
      ssm_params: {}

      autoscalers:
        celery-stage:
          min_capacity: 2
          max_capacity: 4
        flower-stage:
          min_capacity: 1
          max_capacity: 1

