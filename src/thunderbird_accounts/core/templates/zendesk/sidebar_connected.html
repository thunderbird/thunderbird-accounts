{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thunderbird Pro Zendesk Connection</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="{% static 'css/zendesk/sidebar.css' %}">
</head>
<body>
<main class="sidebar">
  <p class="message">Zendesk account connected.</p>
  <section class="section">
    <div class="row">
      <div class="label">Zendesk agent</div>
      <div class="value">{{ identity.email|default:identity.user_id }}</div>
    </div>
    <div class="row">
      <div class="label">Next step</div>
      <div class="value">Return to Zendesk and reload the ticket sidebar.</div>
    </div>
  </section>
</main>
</body>
</html>
