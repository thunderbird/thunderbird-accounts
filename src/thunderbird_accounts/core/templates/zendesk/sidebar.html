{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thundermail Customer</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="{% static 'css/zendesk/sidebar.css' %}">
  <script src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
</head>
<body>
<main class="shell">
  <div id="status" class="message">Loading customer information...</div>
  <iframe id="content-frame" name="content-frame" title="Thundermail customer information" hidden></iframe>
</main>

{{ content_url|json_script:"content-url" }}
<script>
  const minimumFrameHeight = 700;
  const contentUrl = JSON.parse(document.getElementById('content-url').textContent);
  const statusElement = document.getElementById('status');
  const contentFrame = document.getElementById('content-frame');
  let zendeskClient = null;
  let lastFrameHeight = minimumFrameHeight;

  function resizeShell(height) {
    const frameHeight = Math.max(minimumFrameHeight, Math.ceil(Number(height) || minimumFrameHeight));
    lastFrameHeight = frameHeight;
    contentFrame.style.height = `${frameHeight}px`;
    if (zendeskClient) {
      zendeskClient.invoke('resize', { height: `${frameHeight}px` }).catch((error) => {
        console.error('Unable to resize Zendesk sidebar app.', error);
      });
    }
  }

  function resizeFromContentFrame() {
    try {
      const contentDocument = contentFrame.contentDocument || contentFrame.contentWindow?.document;
      resizeShell(contentDocument?.documentElement?.scrollHeight || minimumFrameHeight);
    } catch {
      resizeShell(minimumFrameHeight);
    }
  }

  function showMessage(message, isError = false) {
    statusElement.textContent = message;
    statusElement.className = `message${isError ? ' error' : ''}`;
    statusElement.hidden = false;
    contentFrame.hidden = true;
    resizeShell(minimumFrameHeight);
  }

  function renderContent(response) {
    const html = typeof response === 'string' ? response : response?.responseText;
    if (!html) {
      showMessage('No sidebar content was returned.', true);
      return;
    }

    contentFrame.hidden = false;
    statusElement.hidden = true;
    contentFrame.srcdoc = html;
    resizeShell(minimumFrameHeight);
  }

  async function loadContent(email, viaChannel) {
    const normalizedEmail = (email || '').trim();
    if (!normalizedEmail) {
      showMessage('No requester email is available.');
      return;
    }

    resizeShell(minimumFrameHeight);
    try {
      const response = await zendeskClient.request({
        url: contentUrl,
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({
          email: normalizedEmail,
          via: viaChannel || 'web',
        }),
        headers: {
          Authorization: '{% verbatim %}Bearer {{setting.token}}{% endverbatim %}',
        },
        secure: true,
      });
      renderContent(response);
    } catch (error) {
      if (error?.responseText) {
        renderContent(error.responseText);
        return;
      }
      showMessage(error.message || `Unable to load customer information (${error.status || 'unknown error'}).`, true);
    }
  }

  async function refreshFromZendesk(client) {
    const data = await client.get(['ticket.requester.email', 'ticket.via.channel']);
    await loadContent(data['ticket.requester.email'], data['ticket.via.channel']);
  }

  async function loadFromZendesk() {
    if (!window.ZAFClient) {
      showMessage('Zendesk app context is unavailable.', true);
      return;
    }

    zendeskClient = ZAFClient.init();
    resizeShell(minimumFrameHeight);
    zendeskClient.on('app.registered', () => resizeShell(lastFrameHeight));
    zendeskClient.on('app.activated', () => resizeShell(lastFrameHeight));
    await refreshFromZendesk(zendeskClient);
    zendeskClient.on('ticket.requester.email.changed', () => refreshFromZendesk(zendeskClient));
  }

  window.addEventListener('message', (event) => {
    if (event.source !== contentFrame.contentWindow && event.origin !== window.location.origin) {
      return;
    }

    if (event.data?.type === 'zendesk-sidebar-height') {
      resizeShell(event.data.height);
    }
  });
  contentFrame.addEventListener('load', resizeFromContentFrame);

  loadFromZendesk().catch((error) => {
    showMessage(error.message || String(error), true);
  });
</script>
</body>
</html>
